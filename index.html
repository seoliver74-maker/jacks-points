<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Jack's Points</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Jack's Points" />
  <meta name="theme-color" content="#0a0f2e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #060c28;
      --card: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.10);
      --blue: #4d9fff;
      --blue-bright: #7db8ff;
      --white: #ffffff;
      --off-white: rgba(255,255,255,0.85);
      --muted: rgba(255,255,255,0.38);
      --green: #34d399;
      --green-dim: rgba(52,211,153,0.12);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.12);
      --r: 18px;
      --safe-t: env(safe-area-inset-top);
      --safe-b: env(safe-area-inset-bottom);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg0); color: var(--white);
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    body::before {
      content: ''; position: fixed;
      top: -120px; left: 50%; transform: translateX(-50%);
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(77,159,255,0.18) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }

    .app {
      position: relative; z-index: 1;
      max-width: 430px; margin: 0 auto;
      padding: calc(var(--safe-t) + 18px) 20px calc(var(--safe-b) + 36px);
      display: flex; flex-direction: column; gap: 16px;
    }

    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; }
    .topbar-name { font-size: 13px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); }
    .topbar-date { font-size: 13px; font-weight: 500; color: var(--muted); }
    .topbar-refresh {
      width: 32px; height: 32px; border-radius: 8px;
      border: none; background: transparent; cursor: pointer;
      color: var(--muted); font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; transition: color .15s;
    }
    .topbar-refresh:active { color: var(--white); }
    .topbar-refresh.spinning { animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* HERO */
    .hero {
      text-align: center; padding: 36px 24px 32px;
      background: linear-gradient(160deg, rgba(77,159,255,0.14) 0%, rgba(77,159,255,0.04) 100%);
      border: 1px solid rgba(77,159,255,0.22); border-radius: 24px;
      position: relative; overflow: hidden;
    }
    .hero::after {
      content: ''; position: absolute; bottom: -30px; right: -30px;
      width: 140px; height: 140px;
      background: radial-gradient(circle, rgba(77,159,255,0.14) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--blue); margin-bottom: 10px; }
    .hero-balance { font-size: 84px; font-weight: 900; line-height: 1; letter-spacing: -3px; color: var(--white); font-variant-numeric: tabular-nums; }
    .hero-balance.pop { animation: pop .25s cubic-bezier(.36,.07,.19,.97); }
    @keyframes pop { 0% { transform: scale(1); } 40% { transform: scale(1.07); } 100% { transform: scale(1); } }
    .hero-pts-label { font-size: 16px; font-weight: 500; color: var(--blue-bright); margin-top: 4px; }
    .hero-divider { width: 40px; height: 1px; background: rgba(77,159,255,0.3); margin: 18px auto; }
    .hero-dollars { font-size: 22px; font-weight: 700; color: var(--off-white); }

    /* ACTIONS */
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .action-btn {
      background: var(--card); border: 1px solid var(--card-border); border-radius: 20px;
      padding: 22px 16px 20px; cursor: pointer; font-family: 'Inter', sans-serif;
      color: var(--white); text-align: center; transition: transform .13s;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:active { transform: scale(.94); }
    .action-btn.add { border-color: rgba(52,211,153,0.25); background: var(--green-dim); }
    .action-btn.sub { border-color: rgba(248,113,113,0.25); background: var(--red-dim); }
    .action-icon { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 34px; }
    .action-btn.add .action-icon { background: rgba(52,211,153,0.15); color: var(--green); }
    .action-btn.sub .action-icon { background: rgba(248,113,113,0.15); color: var(--red); }
    .action-label { font-size: 15px; font-weight: 700; }
    .action-btn.add .action-label { color: var(--green); }
    .action-btn.sub .action-label { color: var(--red); }

    /* HISTORY */
    .hist-head { display: flex; align-items: center; padding: 0 2px; }
    .hist-title { font-size: 12px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
    .hist-card { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--r); overflow: hidden; }

    .tx-row {
      display: grid;
      grid-template-columns: 8px 1fr auto auto auto;
      align-items: center; gap: 10px;
      padding: 12px 10px 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .tx-row:last-child { border-bottom: none; }

    .tx-pip { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .tx-pip.weekly { background: var(--blue); }
    .tx-pip.add    { background: var(--green); }
    .tx-pip.sub    { background: var(--red); }

    .tx-body { min-width: 0; }
    .tx-reason { font-size: 14px; font-weight: 500; color: var(--off-white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-reason.is-weekly { color: var(--muted); font-weight: 400; font-size: 13px; }
    .tx-date-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .tx-delta { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 40px; text-align: right; flex-shrink: 0; }
    .tx-delta.weekly { color: var(--blue); }
    .tx-delta.add    { color: var(--green); }
    .tx-delta.sub    { color: var(--red); }

    .tx-bal { font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--blue-bright); opacity: 0.55; min-width: 26px; text-align: right; flex-shrink: 0; }

    /* 3-DOT BUTTON */
    .tx-menu-btn {
      width: 36px; height: 36px; border-radius: 8px;
      border: none; background: transparent; cursor: pointer;
      color: rgba(255,255,255,0.3); font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .12s, color .12s;
      -webkit-tap-highlight-color: transparent;
      padding: 0; line-height: 1;
    }
    .tx-menu-btn:active { background: rgba(255,255,255,0.1); color: var(--white); }

    /* STATUS */
    .status-block { text-align: center; padding: 48px 20px; background: var(--card); border: 1px solid var(--card-border); border-radius: var(--r); }
    .status-icon { font-size: 32px; margin-bottom: 10px; }
    .status-msg { font-size: 14px; color: var(--muted); line-height: 1.5; }
    .retry-btn { margin-top: 16px; background: rgba(77,159,255,0.15); border: 1px solid rgba(77,159,255,0.3); border-radius: 10px; color: var(--blue-bright); font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; padding: 10px 20px; cursor: pointer; }

    /* ALL OVERLAYS */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(6,12,40,0.75);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity .2s; padding-bottom: var(--safe-b);
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .sheet {
      background: #111a44; border-radius: 26px 26px 0 0;
      border-top: 1px solid rgba(77,159,255,0.2);
      padding: 8px 22px 32px;
      width: 100%; max-width: 430px;
      transform: translateY(24px);
      transition: transform .24s cubic-bezier(.22,.68,0,1.2);
    }
    .overlay.open .sheet { transform: translateY(0); }

    .sheet-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; margin: 12px auto 20px; }
    .sheet-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; }
    .sheet-title.add  { color: var(--green); }
    .sheet-title.sub  { color: var(--red); }
    .sheet-title.edit { color: var(--blue-bright); }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
    .field input, .field textarea {
      width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; color: var(--white); font-family: 'Inter', sans-serif;
      font-size: 17px; font-weight: 500; padding: 13px 15px; outline: none;
      transition: border-color .15s; -webkit-appearance: none;
    }
    .field input:focus, .field textarea:focus { border-color: var(--blue); background: rgba(77,159,255,0.06); }
    .field textarea { resize: none; height: 72px; }

    .quick-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .q-btn {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; color: var(--off-white); font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 700; padding: 8px 16px; cursor: pointer;
    }
    .q-btn.sel { background: rgba(77,159,255,0.15); border-color: rgba(77,159,255,0.4); color: var(--blue-bright); }

    .sheet-btns { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel { flex: 1; background: rgba(255,255,255,0.06); border: none; border-radius: 14px; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; padding: 15px; cursor: pointer; }
    .btn-go { flex: 2; border: none; border-radius: 14px; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 800; padding: 15px; cursor: pointer; }
    .btn-go:active { opacity: 0.85; }
    .btn-go.add  { background: var(--green); color: #041a0e; }
    .btn-go.sub  { background: var(--red);   color: #fff; }
    .btn-go.edit { background: var(--blue);  color: #fff; }
    .btn-go:disabled { opacity: 0.5; }

    /* ACTION MENU SHEET (Edit / Delete) */
    .action-sheet { background: #111a44; }
    .action-sheet-label {
      font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); text-align: center; padding: 0 0 16px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .action-sheet-btn {
      display: flex; align-items: center; gap: 14px;
      width: 100%; border: none; border-radius: 14px;
      font-family: 'Inter', sans-serif; font-size: 17px; font-weight: 600;
      padding: 16px 18px; cursor: pointer; margin-bottom: 10px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity .12s;
    }
    .action-sheet-btn:active { opacity: 0.75; }
    .action-sheet-btn.edit-btn { background: rgba(77,159,255,0.15); color: var(--blue-bright); }
    .action-sheet-btn.del-btn  { background: rgba(248,113,113,0.15); color: var(--red); }
    .action-sheet-btn .btn-icon { font-size: 20px; }
    .action-sheet-cancel {
      display: block; width: 100%; border: none; border-radius: 14px;
      background: rgba(255,255,255,0.06); color: var(--muted);
      font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700;
      padding: 15px; cursor: pointer; margin-top: 4px;
    }

    /* DELETE CONFIRM */
    .del-sheet { background: #1a0f0f; border-top-color: rgba(248,113,113,0.25); }
    .del-msg { font-size: 14px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
    .del-entry { font-size: 14px; font-weight: 600; color: var(--off-white); background: rgba(255,255,255,0.05); border-radius: 10px; padding: 12px 14px; margin-bottom: 6px; }

    /* TOAST */
    .toast {
      position: fixed; bottom: calc(var(--safe-b) + 28px); left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: rgba(255,255,255,0.12); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 30px;
      padding: 10px 22px; font-size: 14px; font-weight: 600; color: var(--white);
      opacity: 0; transition: opacity .2s, transform .2s;
      pointer-events: none; white-space: nowrap; z-index: 600;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-name">Jack's Points</div>
    <div class="topbar-date" id="topDate"></div>
    <button class="topbar-refresh" id="refreshBtn" onclick="refresh()" title="Refresh">↺</button>
  </div>

  <div class="hero">
    <div class="hero-eyebrow">Total Balance</div>
    <div class="hero-balance" id="heroBalance">—</div>
    <div class="hero-pts-label">points</div>
    <div class="hero-divider"></div>
    <div class="hero-dollars" id="heroDollars">—</div>
  </div>

  <div class="actions">
    <button class="action-btn add" onclick="openSheet('add')">
      <div class="action-icon">＋</div>
      <div class="action-label">Add</div>
    </button>
    <button class="action-btn sub" onclick="openSheet('sub')">
      <div class="action-icon">－</div>
      <div class="action-label">Remove</div>
    </button>
  </div>

  <div class="hist-head"><div class="hist-title">Last 60 days</div></div>
  <div id="histWrap"></div>
</div>

<!-- ADD / EDIT OVERLAY -->
<div class="overlay" id="mainOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title add" id="sheetTitle">Add Points</div>
    <div class="field">
      <label>Points</label>
      <input id="amtInput" type="number" inputmode="numeric" min="1" max="9999" placeholder="0" />
    </div>
    <div class="quick-row">
      <button class="q-btn" onclick="setQ(5)">5</button>
      <button class="q-btn" onclick="setQ(10)">10</button>
      <button class="q-btn" onclick="setQ(20)">20</button>
      <button class="q-btn" onclick="setQ(25)">25</button>
      <button class="q-btn" onclick="setQ(50)">50</button>
    </div>
    <div class="field">
      <label>Reason</label>
      <textarea id="reasonInput" placeholder="What happened?" maxlength="100"></textarea>
    </div>
    <div class="sheet-btns">
      <button class="btn-cancel" onclick="closeOverlay('mainOverlay')">Cancel</button>
      <button class="btn-go add" id="goBtn" onclick="commit()">Add Points</button>
    </div>
  </div>
</div>

<!-- ACTION MENU (Edit / Delete choice) -->
<div class="overlay" id="actionOverlay">
  <div class="sheet action-sheet">
    <div class="sheet-handle"></div>
    <div class="action-sheet-label" id="actionLabel"></div>
    <button class="action-sheet-btn edit-btn" onclick="doEdit()">
      <span class="btn-icon">✏️</span> Edit entry
    </button>
    <button class="action-sheet-btn del-btn" onclick="doDeletePrompt()">
      <span class="btn-icon">🗑️</span> Delete entry
    </button>
    <button class="action-sheet-cancel" onclick="closeOverlay('actionOverlay')">Cancel</button>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="overlay" id="delOverlay">
  <div class="sheet del-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" style="color:var(--red); margin-bottom:12px;">Delete Entry</div>
    <div class="del-msg">This will permanently remove this entry and adjust the balance.</div>
    <div class="del-entry" id="delEntryLabel"></div>
    <div class="sheet-btns">
      <button class="btn-cancel" onclick="closeOverlay('delOverlay')">Cancel</button>
      <button class="btn-go sub" id="delConfirmBtn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API       = 'https://script.google.com/macros/s/AKfycbyxHhnJz467akhVIBS-u7DfZEXiKuIbglF7MsY95RIdDqh15wvFP_aPeS3EBoUyutdm/exec';
const CENTS     = 10;
const HIST_DAYS = 60;

let txs      = [];
let mode     = 'add';
let saving   = false;
let activeId = null; // tx being acted on

document.getElementById('topDate').textContent =
  new Date().toLocaleDateString([], { weekday:'short', month:'short', day:'numeric' });

// ── OVERLAYS ──────────────────────────────────────────────────────────────────
function openOverlay(id) {
  document.getElementById(id).classList.add('open');
}
function closeOverlay(id) {
  document.getElementById(id).classList.remove('open');
}

// close on backdrop tap
document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', function(e) {
    if (e.target === el) closeOverlay(el.id);
  });
});

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function load() {
  showLoading();
  try {
    const res  = await fetch(API + '?action=load');
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    txs = data.txs;
    render();
  } catch(err) { showError(err.message); }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const balance = txs.reduce((s,t) => s + t.delta, 0);
  document.getElementById('heroBalance').textContent = balance.toLocaleString();
  document.getElementById('heroDollars').textContent = '$' + (balance * CENTS / 100).toFixed(2);

  const balMap = {};
  let run = 0;
  for (const t of txs) { run += t.delta; balMap[t.id] = run; }

  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - HIST_DAYS);
  cutoff.setHours(0,0,0,0);

  const recent = [...txs].filter(t => new Date(t.ts) >= cutoff).reverse();
  const wrap   = document.getElementById('histWrap');

  if (!recent.length) {
    wrap.innerHTML = '<div class="status-block"><div class="status-msg">No activity yet.</div></div>';
    return;
  }

  const today = ds(new Date());
  const yest  = ds(yesterday());

  function lbl(iso) {
    const d = iso.slice(0,10);
    if (d === today) return 'Today';
    if (d === yest)  return 'Yesterday';
    return new Date(d + 'T12:00:00').toLocaleDateString([], { weekday:'short', month:'short', day:'numeric' });
  }

  wrap.innerHTML = '<div class="hist-card">' + recent.map(t => {
    const pip  = t.type === 'weekly' ? 'weekly' : t.type === 'sub' ? 'sub' : 'add';
    const sign = t.delta >= 0 ? '+' : '';
    const txId = t.id.replace(/'/g, '');
    return '<div class="tx-row">' +
      '<div class="tx-pip ' + pip + '"></div>' +
      '<div class="tx-body">' +
        '<div class="tx-reason' + (t.type==='weekly' ? ' is-weekly' : '') + '">' + esc(t.reason) + '</div>' +
        '<div class="tx-date-label">' + lbl(t.ts) + '</div>' +
      '</div>' +
      '<div class="tx-delta ' + pip + '">' + sign + t.delta + '</div>' +
      '<div class="tx-bal">' + balMap[t.id] + '</div>' +
      '<button class="tx-menu-btn" data-id="' + txId + '">⋮</button>' +
    '</div>';
  }).join('') + '</div>';

  // attach listeners after DOM is built
  wrap.querySelectorAll('.tx-menu-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      openActionMenu(this.dataset.id);
    });
  });
}

// ── ACTION MENU ───────────────────────────────────────────────────────────────
function openActionMenu(id) {
  activeId = id;
  const tx = txs.find(t => t.id === id);
  if (!tx) return;
  const sign = tx.delta >= 0 ? '+' : '';
  document.getElementById('actionLabel').textContent =
    sign + tx.delta + ' pts — ' + tx.reason;
  openOverlay('actionOverlay');
}

function doEdit() {
  closeOverlay('actionOverlay');
  const tx = txs.find(t => t.id === activeId);
  if (!tx) return;

  mode = 'edit';
  document.getElementById('amtInput').value    = Math.abs(tx.delta);
  document.getElementById('reasonInput').value = tx.reason;
  document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('sel'));

  const title = document.getElementById('sheetTitle');
  const go    = document.getElementById('goBtn');
  title.textContent = 'Edit Entry'; title.className = 'sheet-title edit';
  go.textContent    = 'Save Changes'; go.className  = 'btn-go edit';

  openOverlay('mainOverlay');
  setTimeout(() => document.getElementById('amtInput').focus(), 200);
}

function doDeletePrompt() {
  closeOverlay('actionOverlay');
  const tx = txs.find(t => t.id === activeId);
  if (!tx) return;
  const sign = tx.delta >= 0 ? '+' : '';
  document.getElementById('delEntryLabel').textContent =
    sign + tx.delta + ' pts — ' + tx.reason;
  openOverlay('delOverlay');
}

// ── ADD / EDIT SHEET ──────────────────────────────────────────────────────────
function openSheet(m) {
  mode = m;
  activeId = null;
  document.getElementById('amtInput').value    = '';
  document.getElementById('reasonInput').value = '';
  document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('sel'));

  const title = document.getElementById('sheetTitle');
  const go    = document.getElementById('goBtn');
  if (m === 'add') {
    title.textContent = 'Add Points';    title.className = 'sheet-title add';
    go.textContent    = 'Add Points';    go.className    = 'btn-go add';
  } else {
    title.textContent = 'Remove Points'; title.className = 'sheet-title sub';
    go.textContent    = 'Remove Points'; go.className    = 'btn-go sub';
  }
  openOverlay('mainOverlay');
  setTimeout(() => document.getElementById('amtInput').focus(), 200);
}

function setQ(n) {
  document.getElementById('amtInput').value = n;
  document.querySelectorAll('.q-btn').forEach(b => b.classList.toggle('sel', +b.textContent === n));
}

// ── COMMIT ────────────────────────────────────────────────────────────────────
async function commit() {
  if (saving) return;
  const amt    = parseInt(document.getElementById('amtInput').value);
  const reason = document.getElementById('reasonInput').value.trim();
  if (!amt || amt <= 0) { document.getElementById('amtInput').focus(); return; }

  const go = document.getElementById('goBtn');
  saving = true; go.disabled = true; go.textContent = 'Saving...';

  try {
    let params;
    if (mode === 'edit') {
      const orig  = txs.find(t => t.id === activeId);
      const delta = orig.delta < 0 ? -amt : amt;
      params = new URLSearchParams({ action:'edit', id:activeId, delta, reason: reason || orig.reason });
    } else {
      const delta  = mode === 'sub' ? -amt : amt;
      const label  = reason || (mode === 'add' ? 'Points added' : 'Points removed');
      const tx     = { id:uid(), type:mode==='sub'?'sub':'add', delta, reason:label, ts:new Date().toISOString() };
      params = new URLSearchParams({ action:'add', id:tx.id, type:tx.type, delta:tx.delta, reason:tx.reason, ts:tx.ts });
    }

    const res  = await fetch(API + '?' + params.toString());
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    txs = data.txs;

    closeOverlay('mainOverlay');
    bumpBalance();
    render();
    showToast(mode === 'edit' ? 'Entry updated' : (parseInt(params.get('delta')) > 0 ? '+' + params.get('delta') + ' pts added' : Math.abs(parseInt(params.get('delta'))) + ' pts removed'));
  } catch(err) {
    showToast('Save failed — try again');
  } finally {
    saving = false; go.disabled = false;
    go.textContent = mode === 'edit' ? 'Save Changes' : mode === 'add' ? 'Add Points' : 'Remove Points';
  }
}

// ── DELETE ────────────────────────────────────────────────────────────────────
async function confirmDelete() {
  const btn = document.getElementById('delConfirmBtn');
  btn.disabled = true; btn.textContent = 'Deleting...';
  try {
    const params = new URLSearchParams({ action:'delete', id:activeId });
    const res    = await fetch(API + '?' + params.toString());
    const data   = await res.json();
    if (!data.ok) throw new Error(data.error);
    txs = data.txs;
    closeOverlay('delOverlay');
    bumpBalance();
    render();
    showToast('Entry deleted');
  } catch(err) {
    showToast('Delete failed — try again');
  } finally {
    btn.disabled = false; btn.textContent = 'Delete';
    activeId = null;
  }
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function bumpBalance() {
  const el = document.getElementById('heroBalance');
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
}
function showLoading() {
  document.getElementById('heroBalance').textContent = '—';
  document.getElementById('heroDollars').textContent = '—';
  document.getElementById('histWrap').innerHTML = '<div class="status-block"><div class="status-icon">⏳</div><div class="status-msg">Loading...</div></div>';
}
function showError(msg) {
  document.getElementById('histWrap').innerHTML = '<div class="status-block"><div class="status-icon">⚠️</div><div class="status-msg">Couldn\'t load. Check connection.</div><button class="retry-btn" onclick="load()">Try again</button></div>';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function refresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  load().finally(() => btn.classList.remove('spinning'));
}

function uid()       { return Math.random().toString(36).slice(2,9); }
function ds(d)       { return d.toISOString().slice(0,10); }
function yesterday() { const d = new Date(); d.setDate(d.getDate()-1); return d; }
function esc(s)      { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('amtInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('reasonInput').focus();
});

load();
</script>
</body>
